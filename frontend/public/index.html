<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouro - بوابة الفرص الذهبية</title>
    <link rel="stylesheet" href="../src/defaults.css">
</head>
<body style="background-color: #121212; color: #D4AF37; margin: 0; font-family: sans-serif;">
    
    <div id="app-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center;">
        <header>
            <div class="logo" style="font-size: 3rem; font-weight: bold; letter-spacing: 5px; margin-bottom: 10px;">OURO</div>
            <p style="font-size: 1.2rem; opacity: 0.8;">بوابة الفرص الذهبية في شبكة باي</p>
        </header>

        <section class="balance-card" style="margin-top: 30px; padding: 20px; border: 1px solid #D4AF37; border-radius: 15px; width: 80%;">
            <p>رصيدك الحالي | Your Balance</p>
            <h2 id="pi-balance" style="font-size: 2.5rem;">0.00 π</h2>
        </section>

        <button id="connect-wallet" style="margin-top: 40px; background-color: #D4AF37; color: #121212; border: none; padding: 15px 40px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer;">
            اتصال بمحفظة باي
        </button>

        <div id="root"></div>
    </div>

</body>
</html>
