<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouro - Golden Opportunities</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">OURO</div>
            <button id="connect-wallet" class="gold-btn">ربط المحفظة | Connect</button>
        </header>

        <section class="balance-card">
            <p>رصيدك الحالي | Your Balance</p>
            <h2 id="pi-balance">0.00 π</h2>
        </section>

        <main>
            <h3>المهام الذهبية | Golden Tasks</h3>
            <div class="task-list">
                <div class="task-card">
                    <h4>الترجمة الاحترافية</h4>
                    <p>ترجمة مقال تقني (عربي/إنجليزي)</p>
                    <span class="reward">Reward: 1.5 π</span>
                    <button class="task-btn">ابدأ الآن</button>
                </div>
            </div>
        </main>

        <section class="subscription">
            <div class="elite-card">
                <h4>Ouro Elite Membership</h4>
                <p>اشتراك شهري للوصول للمهام الكبرى</p>
                <button id="subscribe-pirc2" class="gold-btn-outline">اشترك الآن (PiRC2)</button>
            </div>
        </section>
    </div>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="script.js"></script>
</body>
</html>
